<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para ti ❤️</title>

  <!-- Fuente bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;

      background: 
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
        url('fondo.jpg') no-repeat center center/cover;

      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    button {
      margin-top: 250px;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 20px;
      border: none;
      background: pink;
      cursor: pointer;
      box-shadow: 0 0 10px pink;
    }

    #letra {
      position: absolute;
      top: 45%;
      width: 100%;
      font-size: 7vw;
      font-family: 'Poppins', sans-serif;
      text-shadow: 0 0 20px pink;
      transition: opacity 0.5s;
      letter-spacing: 2px;
    }

    .corazon {
      position: absolute;
      color: pink;
      animation: flotar 6s linear infinite;
      pointer-events: none;
    }

    @keyframes flotar {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<button onclick="iniciar()">Entrar 💖</button>

<audio id="musica" style="display:none;">
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<div id="letra">Presiona entrar 💕</div>

<script>
// ⚠️ NO TOQUÉ TUS TIEMPOS
const letras = [
  { texto: "Tus besos se llegaron a recrear 💖", tiempo: 10 },
  { texto: "Aquí en mi boca 💕", tiempo: 14 },
  { texto: "Llenando de ilusión y de pasión ❤️", tiempo: 18 },
  { texto: "Mi vida loca 💘", tiempo: 22 },

  { texto: "Las horas más felices de mi amor 💖", tiempo: 27 },
  { texto: "Fueron contigo 💕", tiempo: 31 },
  { texto: "Por eso es que mi alma siempre extraña ❤️", tiempo: 36 },
  { texto: "El dulce alivio 💘", tiempo: 42 },

  { texto: "Te puedo yo jurar ante un altar 💖", tiempo: 45 },
  { texto: "Mi amor sincero 💕", tiempo: 49 },
  { texto: "A todo el mundo le puedes contar ❤️", tiempo: 53 },
  { texto: "Que sí te quiero 💘", tiempo: 58 },

  { texto: "Tus labios me enseñaron a sentir 💖", tiempo: 63 },
  { texto: "Lo que es ternura 💕", tiempo: 67 },
  { texto: "Y no me cansaré de bendecir ❤️", tiempo: 71 },
  { texto: "Tanta dulzura 💘", tiempo: 76 },

  { texto: "Tus besos se llegaron a recrear 💖", tiempo: 92 },
  { texto: "Aquí en mi boca 💕", tiempo: 96 },
  { texto: "Llenando de ilusión y de pasión ❤️", tiempo: 100 },
  { texto: "Mi vida loca 💘", tiempo: 104 },

  { texto: "Las horas más felices de mi amor 💖", tiempo: 109 },
  { texto: "Fueron contigo 💕", tiempo: 113 },
  { texto: "Por eso es que mi alma siempre extraña ❤️", tiempo: 117 },
  { texto: "El dulce alivio 💘", tiempo: 122 },

  { texto: "Te puedo yo jurar ante un altar 💖", tiempo: 127 },
  { texto: "Mi amor sincero 💕", tiempo: 131 },
  { texto: "A todo el mundo le puedes contar ❤️", tiempo: 135 },
  { texto: "Que sí te quiero 💘", tiempo: 140 },

  { texto: "Tus labios me enseñaron a sentir 💖", tiempo: 145 },
  { texto: "Lo que es ternura 💕", tiempo: 149 },
  { texto: "Y no me cansaré de bendecir ❤️", tiempo: 153 },
  { texto: "Tanta dulzura 💖", tiempo: 160 }
];

let ultimaLinea = "";

function iniciar() {
  const audio = document.getElementById("musica");
  const letra = document.getElementById("letra");

  audio.play();

  document.querySelector("button").style.display = "none";

  // corazones
  setInterval(() => {
    let corazon = document.createElement("div");
    corazon.innerHTML = "💖";
    corazon.className = "corazon";
    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = (Math.random() * 20 + 15) + "px";

    document.body.appendChild(corazon);

    setTimeout(() => corazon.remove(), 6000);
  }, 400);

  // sincronización sin parpadeo
  audio.ontimeupdate = () => {
    let t = audio.currentTime;

    for (let i = 0; i < letras.length; i++) {
      if (t >= letras[i].tiempo && t < letras[i].tiempo + 3) {

        if (ultimaLinea !== letras[i].texto) {
          ultimaLinea = letras[i].texto;

          letra.style.opacity = 0;

          setTimeout(() => {
            letra.innerText = letras[i].texto;
            letra.style.opacity = 1;
          }, 200);
        }

        break;
      }
    }
  };
}
</script>

</body>
</html>
