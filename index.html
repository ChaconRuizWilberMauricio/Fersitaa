<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para ti ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #2b0033, #000000);
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    button {
      margin-top: 40px;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 20px;
      border: none;
      background: pink;
      cursor: pointer;
      box-shadow: 0 0 10px pink;
    }

    #letra {
      position: absolute;
      top: 45%;
      width: 100%;
      font-size: 6vw;
      text-shadow: 0 0 15px pink;
      transition: opacity 0.5s;
    }

    audio {
      margin-top: 20px;
    }

    .corazon {
      position: absolute;
      color: pink;
      animation: flotar 6s linear infinite;
      pointer-events: none;
    }

    @keyframes flotar {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<button onclick="iniciar()">Entrar 💖</button>

<br>

<audio id="musica" controls>
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<div id="letra">Presiona entrar 💕</div>

<script>
const letras = [
  { texto: "Contigo aprendí...", tiempo: 5 },
  { texto: "Que existen nuevas emociones...", tiempo: 9 },
  { texto: "Contigo aprendí...", tiempo: 15 },
  { texto: "A conocer un mundo nuevo...", tiempo: 19 },
  { texto: "Y a ser feliz contigo 💖", tiempo: 25 }
];

function iniciar() {
  const audio = document.getElementById("musica");
  const letra = document.getElementById("letra");

  audio.play();

  // 💕 corazones
  setInterval(() => {
    let corazon = document.createElement("div");
    corazon.innerHTML = "💖";
    corazon.className = "corazon";
    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = (Math.random() * 20 + 15) + "px";

    document.body.appendChild(corazon);

    setTimeout(() => corazon.remove(), 6000);
  }, 400);

  // 🎵 sincronización real
  audio.ontimeupdate = () => {
    let t = audio.currentTime;

    letras.forEach(linea => {
      if (t >= linea.tiempo && t < linea.tiempo + 2) {
        letra.style.opacity = 0;

        setTimeout(() => {
          letra.innerText = linea.texto;
          letra.style.opacity = 1;
        }, 200);
      }
    });
  };
}
</script>

</body>
</html>
