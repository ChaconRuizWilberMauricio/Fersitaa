<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para ti ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle, #2b0033, #000);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    button {
      margin-top: 40px;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 20px;
      border: none;
      background: pink;
      cursor: pointer;
    }

    #letra {
      position: absolute;
      top: 45%;
      width: 100%;
      font-size: 6vw;
      text-shadow: 0 0 15px pink;
      transition: opacity 0.5s;
    }

    .corazon {
      position: absolute;
      color: pink;
      animation: flotar 6s linear infinite;
    }

    @keyframes flotar {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

<button onclick="iniciar()">Entrar 💖</button>

<audio id="musica" style="display:none;">
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<div id="letra">Presiona entrar 💕</div>

<script>
const letras = [
  { texto: "Tus besos se llegaron a recrear", tiempo: 10 },
  { texto: "Aquí en mi boca", tiempo: 14 },
  { texto: "Llenando de ilusión y de pasión", tiempo: 18 },
  { texto: "Mi vida loca", tiempo: 22 },

  { texto: "Las horas más felices de mi amor", tiempo: 27 },
  { texto: "Fueron contigo", tiempo: 31 },
  { texto: "Por eso es que mi alma siempre extraña", tiempo: 35 },
  { texto: "El dulce alivio", tiempo: 40 },

  { texto: "Te puedo yo jurar ante un altar", tiempo: 45 },
  { texto: "Mi amor sincero", tiempo: 49 },
  { texto: "A todo el mundo le puedes contar", tiempo: 53 },
  { texto: "Que sí te quiero", tiempo: 58 },

  { texto: "Tus labios me enseñaron a sentir", tiempo: 63 },
  { texto: "Lo que es ternura", tiempo: 67 },
  { texto: "Y no me cansaré de bendecir", tiempo: 71 },
  { texto: "Tanta dulzura", tiempo: 76 },

  { texto: "Tus besos se llegaron a recrear", tiempo: 92 },
  { texto: "Aquí en mi boca", tiempo: 86 },
  { texto: "Llenando de ilusión y de pasión", tiempo: 100 },
  { texto: "Mi vida loca", tiempo: 94 },

  { texto: "Las horas más felices de mi amor", tiempo: 109 },
  { texto: "Fueron contigo", tiempo: 103 },
  { texto: "Por eso es que mi alma siempre extraña", tiempo: 117 },
  { texto: "El dulce alivio", tiempo: 122 },

  { texto: "Te puedo yo jurar ante un altar", tiempo: 127 },
  { texto: "Mi amor sincero", tiempo: 121 },
  { texto: "A todo el mundo le puedes contar", tiempo: 135 },
  { texto: "Que sí te quiero", tiempo: 140 },

  { texto: "Tus labios me enseñaron a sentir", tiempo: 145 },
  { texto: "Lo que es ternura", tiempo: 149 },
  { texto: "Y no me cansaré de bendecir", tiempo: 153 },
  { texto: "Tanta dulzura 💖", tiempo: 158 }
];

let ultimaLinea = "";

function iniciar() {
  const audio = document.getElementById("musica");
  const letra = document.getElementById("letra");

  audio.play();

  document.querySelector("button").style.display = "none";

  // corazones
  setInterval(() => {
    let corazon = document.createElement("div");
    corazon.innerHTML = "💖";
    corazon.className = "corazon";
    corazon.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(corazon);

    setTimeout(() => corazon.remove(), 6000);
  }, 400);

  // sincronización real sin parpadeo
  audio.ontimeupdate = () => {
    let t = audio.currentTime;

    for (let i = 0; i < letras.length; i++) {
      if (t >= letras[i].tiempo && t < letras[i].tiempo + 3) {

        if (ultimaLinea !== letras[i].texto) {
          ultimaLinea = letras[i].texto;

          letra.style.opacity = 0;

          setTimeout(() => {
            letra.innerText = letras[i].texto;
            letra.style.opacity = 1;
          }, 200);
        }

        break;
      }
    }
  };
}
</script>

</body>
</html>
