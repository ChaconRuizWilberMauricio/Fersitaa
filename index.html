<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para ti ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle, #2b0033, #000);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    button {
      margin-top: 40px;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 20px;
      border: none;
      background: pink;
      cursor: pointer;
    }

    #letra {
      position: absolute;
      top: 45%;
      width: 100%;
      font-size: 6vw;
      text-shadow: 0 0 15px pink;
    }

    .corazon {
      position: absolute;
      color: pink;
      animation: flotar 6s linear infinite;
    }

    @keyframes flotar {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

<button onclick="iniciar()">Entrar 💖</button>

<audio id="musica" controls>
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<div id="letra">Presiona entrar 💕</div>

<script>
const letras = [
  { texto: "Contigo aprendí...", tiempo: 5 },
  { texto: "Que existen nuevas y mejores emociones...", tiempo: 10 },
  { texto: "Contigo aprendí...", tiempo: 16 },
  { texto: "A conocer un mundo nuevo de ilusiones...", tiempo: 20 },
  { texto: "Aprendí que la semana tiene más de siete días...", tiempo: 26 },
  { texto: "A hacer mayores mis contadas alegrías...", tiempo: 34 },
  { texto: "Y a ser dichoso yo contigo lo aprendí 💖", tiempo: 42 }
];

function iniciar() {
  const audio = document.getElementById("musica");
  const letra = document.getElementById("letra");

  audio.play();

  // corazones
  setInterval(() => {
    let corazon = document.createElement("div");
    corazon.innerHTML = "💖";
    corazon.className = "corazon";
    corazon.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(corazon);

    setTimeout(() => corazon.remove(), 6000);
  }, 400);

  // sincronización
  audio.ontimeupdate = () => {
    let t = audio.currentTime;

    for (let i = 0; i < letras.length; i++) {
      if (t >= letras[i].tiempo && t < letras[i].tiempo + 3) {
        letra.innerText = letras[i].texto;
        break;
      }
    }
  };
}
</script>

</body>
</html>
